version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing AWS CDK CLI..."
      - npm install -g aws-cdk
      - echo "Changing into ui/cdk_backend directory"
      - cd ui/cdk_backend
      - echo "Installing npm dependencies"
      - npm ci

  pre_build:
    commands:
      - cd $CODEBUILD_SRC_DIR/ui/cdk_backend
      - echo "Building TypeScript sources"
      - npm run build
      - echo "Bootstrapping CDK (no approval)..."
      - >-
        cdk bootstrap --require-approval never \
          -c PDF_TO_PDF_BUCKET=$PDF_TO_PDF_BUCKET \
          -c PDF_TO_HTML_BUCKET=$PDF_TO_HTML_BUCKET \
          -c COGNITO_DOMAIN_PREFIX=${COGNITO_DOMAIN_PREFIX:-pdf-ui-authkqqjyt} \
          ${CUSTOM_DOMAIN:+-c CUSTOM_DOMAIN=$CUSTOM_DOMAIN}

  build:
    commands:
      - cd $CODEBUILD_SRC_DIR/ui/cdk_backend
      - echo "Deploying all CDK stacks..."
      - >-
        cdk deploy --all --require-approval never \
          -c PDF_TO_PDF_BUCKET=$PDF_TO_PDF_BUCKET \
          -c PDF_TO_HTML_BUCKET=$PDF_TO_HTML_BUCKET \
          -c COGNITO_DOMAIN_PREFIX=${COGNITO_DOMAIN_PREFIX:-pdf-ui-authkqqjyt} \
          ${CUSTOM_DOMAIN:+-c CUSTOM_DOMAIN=$CUSTOM_DOMAIN}

  post_build:
    commands:
      - echo "CDK deployment complete."
      - echo "Configuring WAF..."
      - python3 $CODEBUILD_SRC_DIR/ui/setup-waf.py
